<template>
    <template if:true={isLoading}>
        <lightning-quick-action-panel header="Project Preview and Email">
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner alternative-text="Loading Project Preview and Email" size="medium"></lightning-spinner>
            </div>
        </lightning-quick-action-panel>
    </template>

    <template if:true={isBlocked}>
        <lightning-quick-action-panel header="Project Preview and Email">
            <div class="slds-notify slds-notify_alert slds-alert_warning" role="alert">
                <span class="slds-assistive-text">Warning</span>
                <h2>{message}</h2>
            </div>
            <div slot="footer">
                <lightning-button variant="neutral" label="Cancel" onclick={handleClose}></lightning-button>
            </div>
        </lightning-quick-action-panel>
    </template>

    <template if:true={showEmailComposer}>
        <buildertek-email-composer
            record-id={recordId}
            obj-api-name={objApiName}
            file-name={fileName}
            include-ref-id={includeRefId}
            header-title={headerTitle}
            attachment-template-query={attachmentTemplateQuery}
            body-template-query={bodyTemplateQuery}
            show-file-upload={showFileUpload}
            is-body-required={isBodyRequired}
            show-signature-pad={showSignaturePad}
            show-accept-buttons={showAcceptButtons}
            default-from-address={defaultFromAddress}
            default-to-address={defaultToAddress}
            default-email-template={defaultEmailTemplate}
            email-subject={emailSubject}
            override-subject-with-template-subject={overrideSubjectWithTemplateSubject}
            default-selected-contact={defaultSelectedContact}
            signed-pdf-name={signedPdfName}
            delete-signature-after-save={deleteSignatureAfterSave}
            onsubmit={handleSubmit}
            onclose={handleClose}>
        </buildertek-email-composer>
    </template>
</template>
